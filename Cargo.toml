[workspace]
resolver = "2"
members = [
  "crates/common",
]

[workspace.package]
edition = "2024"
license = "MIT OR Apache-2.0"

[workspace.dependencies]
bytes = "1"
crc32fast = "1"
parking_lot = "0.12"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
sqlparser = "0.56"
tempfile = "3"
thiserror = "2"
tokio = { version = "1", features = ["full"] }
